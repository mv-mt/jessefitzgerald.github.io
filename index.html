<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesse Fitzgerald</title>
  <meta name="description" content="Projects in photography, tech, and everything in between.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f1a1f;
      --ink-soft: #4a5c63;
      --ink-muted: #8a9ea6;
      --cream: #faf9f7;
      --accent: #2d5a4e;
      --accent-light: #e8f0ee;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      overflow: hidden;
    }

    @media (max-width: 680px) {
      body { overflow: auto; }
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      min-height: 100dvh;
    }

    /* Left panel */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 6vw, 5rem);
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 600;
      line-height: 1.0;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .tagline {
      font-family: var(--sans);
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
      font-weight: 300;
      color: var(--ink-soft);
      line-height: 1.7;
      max-width: 320px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.4s forwards;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      padding: 0.7rem 0;
      border-bottom: 0.5px solid #d0d8d6;
      transition: color 0.2s, border-color 0.2s;
      max-width: 280px;
    }

    .link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      font-size: 1rem;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link:hover .link-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    .footer {
      position: absolute;
      bottom: clamp(1.5rem, 3vw, 2.5rem);
      left: clamp(2rem, 6vw, 5rem);
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    /* Right panel — photo */
    .right {
      position: relative;
      overflow: hidden;
    }

    .right::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, var(--cream) 0%, transparent 18%);
      pointer-events: none;
      z-index: 1;
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      animation: fadeIn 1s ease 0.3s forwards;
      filter: saturate(0.88) contrast(1.04);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 680px) {
      body { overflow: auto; }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 42vh auto;
        height: auto;
        min-height: 100dvh;
      }

      .right {
        grid-row: 1;
        order: -1;
      }

      .right::after {
        background: linear-gradient(to bottom, transparent 60%, var(--cream) 100%);
      }

      .left {
        grid-row: 2;
        padding: 2rem 1.75rem 3rem;
        justify-content: flex-start;
      }

      h1 {
        font-size: 3rem;
      }

      .footer {
        position: static;
        margin-top: 2.5rem;
      }

      .link {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left">
      <p class="eyebrow">Brisbane, Australia</p>
      <h1>Jesse<br>Fitzgerald</h1>
      <p class="tagline">Projects in photography, tech, and everything in between.</p>
      <nav class="links" aria-label="Main navigation">
        <a class="link" href="https://portfolio.jessefitzgerald.com">
          <span class="link-label">Portfolio</span>
          <span class="link-arrow">→</span>
        </a>
        <a class="link" href="https://blog.jessefitzgerald.com">
          <span class="link-label">Blog</span>
          <span class="link-arrow">→</span>
        </a>
        <a class="link" href="mailto:hello@jessefitzgerald.com">
          <span class="link-label">hello@jessefitzgerald.com</span>
          <span class="link-arrow">→</span>
        </a>
      </nav>
      <p class="footer">jessefitzgerald.com</p>
    </div>
    <div class="right">
      <!--
        Replace the img below with your own photo.
        Recommended: a portrait or landscape shot, at least 1200px wide.
        Save it as photo.jpg in the same folder as this index.html file.
      -->
      <img
        class="photo"
        src="photo.jpg"
        alt="Jesse Fitzgerald"
        onerror="this.parentElement.style.background='#1a2e35'"
      >
    </div>
  </div>
</body>
</html>
