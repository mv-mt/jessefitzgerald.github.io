<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jesse fitzgerald</title>
  <meta name="description" content="projects in photography, tech, and everything between.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <meta property="og:title" content="jesse fitzgerald">
  <meta property="og:description" content="projects in photography, tech, and everything between.">
  <meta property="og:image" content="share.png">
  <meta property="og:url" content="https://jessefitzgerald.com">
  <meta property="og:type" content="website">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111;
      --muted: #999;
      --dots: #bbb;
      --bg: #fff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--black);
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 400;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 2.5rem 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: flex-start;
    }

    .logo {
      width: 120px;
      height: 120px;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.1s forwards;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 0;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.25s forwards;
    }

    .tagline {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.01em;
    }

    nav {
      display: flex;
      flex-direction: column;
      max-width: 440px;
    }

    .dots {
      width: 100%;
      border: none;
      border-top: 3px dotted var(--dots);
      margin: 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 0;
      font-size: 15px;
      font-weight: 400;
      color: var(--black);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-link:hover {
      color: var(--muted);
    }

    .nav-link .arrow {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      transition: transform 0.15s;
    }

    .nav-link:hover .arrow {
      transform: translateX(3px);
    }

    footer {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.4s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .page { padding: 1.75rem 1.75rem 1.5rem; }
      .logo { width: 90px; height: 90px; }
      nav { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <img class="logo" src="logo.svg" alt="jesse fitzgerald">
    </header>

    <main>
      <p class="tagline">projects in photography, tech, and everything between.</p>
      <nav>
        <hr class="dots">
        <a class="nav-link" href="https://portfolio.jessefitzgerald.com">
          <span>portfolio</span>
          <span class="arrow">→</span>
        </a>
        <hr class="dots">
        <a class="nav-link" href="https://blog.jessefitzgerald.com">
          <span>blog</span>
          <span class="arrow">→</span>
        </a>
        <hr class="dots">
        <a class="nav-link" href="mailto:hello@jessefitzgerald.com">
          <span>hello@jessefitzgerald.com</span>
          <span class="arrow">→</span>
        </a>
        <hr class="dots">
      </nav>
    </main>

    <footer>
      © 2026 jf. all rights reserved
    </footer>
  </div>
</body>
</html>
